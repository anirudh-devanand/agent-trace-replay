global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api
    static_configs:
      - targets: ["api:8000"]
  - job_name: normalizer
    static_configs:
      - targets: ["normalizer:8001"]
  - job_name: worker
    static_configs:
      - targets: ["worker:8002"]
